name: Sync Vault Events & Deploy

on:
  push:
    branches: ["main"]
  repository_dispatch:
    types: [vault-events-updated]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout vault events
        uses: actions/checkout@v4
        with:
          repository: ma7dev/Vault
          token: ${{ secrets.VAULT_PAT }}
          sparse-checkout: |
            cursorsaudi/events
            __media
          sparse-checkout-cone-mode: false
          path: vault

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync events from vault
        run: node scripts/sync-vault-events.mjs --vault-path vault

      - name: Build site
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=cursorsaudi-com
